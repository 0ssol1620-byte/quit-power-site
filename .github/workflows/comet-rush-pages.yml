name: Deploy Comet Rush Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - 404.html
      - comet-rush/**
      - .github/workflows/comet-rush-pages.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: comet-rush-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Comet Rush site
        run: |
          rm -rf _site
          mkdir -p _site/comet-rush
          cp index.html _site/index.html
          cp 404.html _site/404.html
          cp comet-rush/index.html _site/comet-rush/index.html
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mirror gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd _site
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy Comet Rush Pages"
          git branch -M gh-pages
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin gh-pages
