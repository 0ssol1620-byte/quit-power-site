<style>
html,body,#game{margin:0;width:100%;height:100%;overflow:hidden;background:#06111c;color:#f8fbff;font-family:Pretendard,SUIT,"Noto Sans KR",sans-serif;touch-action:none}body{background:radial-gradient(circle at 50% -10%,#10405d 0,#07131f 42%,#030912 100%)}#game{display:grid;place-items:center}canvas{max-width:520px;max-height:100dvh;box-shadow:0 30px 90px #0008;border-inline:1px solid #ffffff12}.hint{position:fixed;left:0;right:0;bottom:8px;text-align:center;font-size:11px;color:#90c9da;pointer-events:none}

<div id="game"></div><div class="hint">GitHub Pages 모바일 테스트 빌드 · 앱인토스 SDK는 토스 앱 WebView에서만 활성화됩니다</div>
<script>
(()=>{const W=390,H=844,ROUND=45,Y=710,K='comet-rush-preview-save',C={a:0x00c2ff,g:0xffc857,w:0xf8fbff,i:0x07131f,p:0xff5f9f,v:0x8c72ff,r:0xff4f64};let best=+(localStorage.getItem(K)||0);function hap(p){try{navigator.vibrate&&navigator.vibrate(p)}catch(e){}}class S extends Phaser.Scene{constructor(){super('s');this.actors=[];this.stars=[];this.phase='menu'}create(){this.tex();this.bg();this.hud();this.menu()}update(t,d){this.stars.forEach(s=>{s.y+=s.getData('v')*d*(this.phase==='playing'?2.4:.8);if(s.y>H+4){s.y=-4;s.x=Phaser.Math.Between(4,W-4)}});if(this.phase!=='playing')return;this.left=Math.max(0,this.left-d/1000);this.diff=1+(ROUND-this.left)/26;this.spawn+=d;this.fever=Math.max(0,this.fever-d);this.player.x=Phaser.Math.Linear(this.player.x,this.tx,1-Math.pow(.002,d/1000));this.player.y=Y+Math.sin(t*.007)*5;this.player.rotation=Phaser.Math.Clamp((this.tx-this.player.x)*.005,-.28,.28);this.loop();this.move(d);if(this.combo&&t-this.last>this.grace){this.combo=Math.max(0,this.combo-1);this.last=t-this.grace+300}this.drawHud();if(this.left<=0)this.end('완주')}tex(){if(this.textures.exists('ship'))return;let g=this.make.graphics({x:0,y:0},false);g.fillStyle(C.a,.18).fillEllipse(48,50,78,60);g.fillStyle(0xf7f0d8).fillTriangle(48,5,16,76,80,76);g.fillStyle(C.a).fillTriangle(48,12,30,62,66,62);g.fillStyle(C.i).fillEllipse(48,43,20,15);g.lineStyle(3,C.w,.7).strokeTriangle(48,5,16,76,80,76);g.generateTexture('ship',96,88);g.clear();g.fillGradientStyle(C.g,C.g,C.r,C.r,1,1,.25,.25).fillTriangle(22,0,5,48,39,48);g.generateTexture('flame',44,54);g.clear();g.fillStyle(C.a,.2).fillCircle(28,28,26);g.fillStyle(C.w).fillTriangle(28,0,56,28,28,56);g.fillStyle(C.a).fillTriangle(28,0,28,56,0,28);g.lineStyle(2,C.w,.75).strokeCircle(28,28,24);g.generateTexture('shard',58,58);g.clear();g.fillStyle(0x010408).fillCircle(34,34,30);g.lineStyle(5,C.v,.55).strokeCircle(34,34,26);g.lineStyle(3,C.r,.45).strokeCircle(34,34,18);g.generateTexture('hazard',68,68);g.clear();g.fillStyle(C.g,.22).fillCircle(34,34,32);g.lineStyle(4,C.g,.75).strokeCircle(34,34,24);g.fillStyle(C.g).fillCircle(34,34,12);g.generateTexture('pulse',68,68);g.clear();g.fillStyle(C.g).fillCircle(24,24,20);g.fillStyle(0xfff4b0).fillCircle(18,17,7);g.lineStyle(3,0xb46a12,.45).strokeCircle(24,24,18);g.generateTexture('coin',48,48);g.clear();g.fillStyle(C.a,.12).fillCircle(120,120,112);g.lineStyle(3,C.a,.35).strokeCircle(120,120,92);g.fillStyle(0xf7f0d8).fillTriangle(120,38,78,176,162,176);g.fillStyle(C.a).fillTriangle(120,56,96,148,144,148);g.generateTexture('hero',240,240);g.destroy()}bg(){let g=this.add.graphics();g.fillGradientStyle(0x07131f,0x07131f,0x102b43,0x031019,1,1,1,1).fillRect(0,0,W,H);g.fillStyle(C.a,.08).fillEllipse(70,145,330,220);g.fillStyle(C.g,.06).fillEllipse(346,650,280,340);for(let i=0;i<95;i++){let s=this.add.ellipse(Phaser.Math.Between(5,W-5),Phaser.Math.Between(0,H),Phaser.Math.FloatBetween(1.2,3.4),Phaser.Math.FloatBetween(1.2,3.4),i%7?C.w:C.g,Phaser.Math.FloatBetween(.22,.78));s.setData('v',Phaser.Math.FloatBetween(.015,.072));this.stars.push(s)}this.glow=this.add.ellipse(0,0,92,42,C.a,.16);this.ring=this.add.ellipse(0,0,106,106,C.a,.03).setStrokeStyle(2,C.a,.28);let f=this.add.image(0,31,'flame').setAlpha(.86),ship=this.add.image(0,0,'ship');this.player=this.add.container(W/2,Y,[this.glow,this.ring,f,ship]).setDepth(12);this.tweens.add({targets:f,scaleY:1.3,alpha:.52,yoyo:true,repeat:-1,duration:150});this.input.on('pointerdown',p=>{if(this.phase==='menu')return;this.tx=Phaser.Math.Clamp(p.x,38,W-38)});this.input.on('pointermove',p=>{if(this.phase==='playing')this.tx=Phaser.Math.Clamp(p.x,38,W-38)})}hud(){let st={fontFamily:'Pretendard,sans-serif',fontStyle:'900',color:'#f8fbff',shadow:{color:'#001622',blur:12,fill:true}};this.scoreT=this.add.text(22,20,'0',{...st,fontSize:'28px'}).setDepth(20);this.timeT=this.add.text(W-22,23,'45.0',{...st,fontSize:'22px',color:'#ffc857'}).setOrigin(1,0).setDepth(20);this.comboT=this.add.text(22,58,'콤보 0',{fontFamily:'Pretendard,sans-serif',fontSize:'14px',color:'#a9dced'}).setDepth(20);this.midT=this.add.text(W/2,58,'',{align:'center',fontFamily:'Pretendard,sans-serif',fontSize:'12px',color:'#d9f7ff'}).setOrigin(.5,0).setDepth(20)}btn(x,y,w,h,label,color,cb){let c=this.add.container(x,y),s=this.add.rectangle(0,7,w,h,0,.2),b=this.add.rectangle(0,0,w,h,color,.96).setStrokeStyle(2,C.w,.24),t=this.add.text(0,0,label,{fontFamily:'Pretendard,sans-serif',fontSize:h>50?'20px':'15px',fontStyle:'900',color:color===C.g?'#17130f':'#041522'}).setOrigin(.5);c.add([s,b,t]).setSize(w,h).setInteractive(new Phaser.Geom.Rectangle(-w/2,-h/2,w,h),Phaser.Geom.Rectangle.Contains).on('pointerdown',()=>{hap(8);this.tweens.add({targets:c,scale:.96,duration:70,yoyo:true,onComplete:cb})});return c}menu(){this.phase='menu';this.clear();this.over&&this.over.destroy();let p=this.add.container(0,0).setDepth(30),hero=this.add.image(W/2,165,'hero').setScale(1.18),title=this.add.text(W/2,255,'COMET\nRUSH',{align:'center',fontFamily:'Pretendard,sans-serif',fontSize:'58px',fontStyle:'900',lineSpacing:-12,color:'#f8fbff',shadow:{color:'#00c2ff',blur:24,fill:true}}).setOrigin(.5),sub=this.add.text(W/2,345,'45초 안에 별조각을 긁어모으고\n블랙홀을 스치듯 피하세요',{align:'center',fontFamily:'Pretendard,sans-serif',fontSize:'17px',lineSpacing:6,color:'#b8d9e7'}).setOrigin(.5),bt=this.btn(W/2,555,250,58,'러시 시작',C.a,()=>this.start()),bestT=this.add.text(W/2,425,'최고점수 '+best.toLocaleString('ko-KR'),{fontFamily:'Pretendard,sans-serif',fontSize:'16px',fontStyle:'900',color:'#ffc857'}).setOrigin(.5),foot=this.add.text(W/2,777,'드래그 이동 · 콤보 유지 · 피버 폭발',{fontFamily:'Pretendard,sans-serif',fontSize:'12px',color:'#7eb5c9'}).setOrigin(.5);p.add([hero,title,sub,bestT,bt,foot]);p.alpha=0;this.menuL=p;this.tweens.add({targets:p,alpha:1,y:-10,duration:520,ease:'Cubic.easeOut'})}start(){this.menuL&&this.menuL.destroy();this.phase='playing';Object.assign(this,{score:0,combo:0,max:0,hp:3,left:ROUND,tx:W/2,spawn:0,diff:1,fever:0,last:0,grace:1650,shards:0,near:0,fevers:0});this.player.setPosition(W/2,Y);this.clear();hap([12,24,18]);this.drawHud()}loop(){let gap=Math.max(250,660-this.diff*110-(this.fever?75:0));if(this.spawn<gap)return;this.spawn=0;let r=Math.random();this.addA(r<.1+this.diff*.018?'hazard':r<.18?'pulse':r>.91?'coin':'shard');if(Math.random()<.16+this.diff*.025)this.time.delayedCall(130,()=>this.addA(Math.random()<.34?'hazard':'shard'))}addA(k){let img=this.add.image(Phaser.Math.Between(34,W-34),-34,k).setDepth(k==='hazard'?8:7).setScale(k==='hazard'?Phaser.Math.FloatBetween(.92,1.2):Phaser.Math.FloatBetween(.86,1.18));this.actors.push({k,img,r:k==='hazard'?28:k==='pulse'?25:21,s:(k==='hazard'?195:k==='pulse'?155:170)*this.diff*(this.fever&&k==='hazard'?.76:1),v:k==='coin'?180:k==='pulse'?80:50,n:false})}move(d){let rem=new Set,dt=d/1000;for(const a of this.actors){a.img.y+=a.s*dt;a.img.x+=Math.sin((a.img.y+a.img.x)*.02)*(a.k==='hazard'?18:7)*dt;a.img.rotation+=dt*(a.k==='hazard'?1.8:3.8);let dist=Phaser.Math.Distance.Between(this.player.x,this.player.y,a.img.x,a.img.y),mag=this.fever?104:74;if(a.k!=='hazard'&&dist<mag){a.img.x+=(this.player.x-a.img.x)*.08;a.img.y+=(this.player.y-a.img.y)*.08}if(a.k==='hazard'&&dist<a.r+24){rem.add(a);this.hit();continue}if(a.k==='hazard'&&!a.n&&dist<a.r+64&&dist>a.r+30){a.n=true;this.near++;this.score+=70+this.combo*5;hap(6);this.fx(a.img.x,a.img.y,C.v,5)}if(a.k!=='hazard'&&dist<a.r+28){rem.add(a);this.get(a)}if(a.img.y>H+70)rem.add(a)}if(rem.size)this.actors=this.actors.filter(a=>{if(!rem.has(a))return true;a.img.destroy();return false})}get(a){let now=this.time.now;this.combo=now-this.last<this.grace?this.combo+1:1;this.max=Math.max(this.max,this.combo);this.last=now;let mult=(this.fever?2.1:1)*(1+Math.min(this.combo,36)*.045);this.score+=Math.round((a.v+(a.k==='pulse'?0:this.hp*8))*mult);if(a.k!=='pulse'){this.shards++;hap(this.combo%8?6:12)}else this.pulse();this.fx(a.img.x,a.img.y,a.k==='coin'?C.g:C.a,a.k==='pulse'?18:8);this.pop(a.img.x,a.img.y-18,'+'+a.v);if(this.combo&&this.combo%10===0){this.left=Math.min(ROUND,this.left+1.2);hap(18);this.pop(this.player.x,this.player.y-74,'+1.2초')}}pulse(){this.fever=Math.max(this.fever,6200);this.fevers++;this.grace=2200;this.cameras.main.flash(190,0,194,255);hap([8,16,8,16,22])}hit(){if(this.fever){this.score+=140;this.cameras.main.shake(90,.005);this.pop(this.player.x,this.player.y-88,'피버 방어');return}this.hp--;this.combo=0;hap([28,24,28]);this.cameras.main.shake(170,.012);if(this.hp<=0)this.end('선체 손상')}end(label){if(this.phase!=='playing')return;this.phase='gameover';this.clear();best=Math.max(best,this.score);localStorage.setItem(K,best);let l=this.add.container(0,0).setDepth(40),o=this.add.rectangle(W/2,H/2,W,H,0x02070d,.72),card=this.add.rectangle(W/2,370,326,390,0x0a2031,.94).setStrokeStyle(1,C.a,.35),ti=this.add.text(W/2,222,this.score>=best?'새 기록':label,{fontFamily:'Pretendard,sans-serif',fontSize:'26px',fontStyle:'900',color:this.score>=best?'#ffc857':'#f8fbff'}).setOrigin(.5),sc=this.add.text(W/2,292,this.score.toLocaleString('ko-KR'),{fontFamily:'Pretendard,sans-serif',fontSize:'58px',fontStyle:'900',color:'#f8fbff',shadow:{color:'#00c2ff',blur:18,fill:true}}).setOrigin(.5),de=this.add.text(W/2,370,`최대 콤보 ${this.max} · 근접회피 ${this.near} · 피버 ${this.fevers}`,{fontFamily:'Pretendard,sans-serif',fontSize:'14px',color:'#cdeffc'}).setOrigin(.5),re=this.btn(W/2,505,248,58,'다시 달리기',C.a,()=>{l.destroy();this.start()}),me=this.btn(W/2,578,216,46,'메뉴',C.g,()=>{l.destroy();this.menu()});l.add([o,card,ti,sc,de,re,me]);this.over=l}drawHud(){this.scoreT.setText((this.score||0).toLocaleString('ko-KR'));this.timeT.setText((this.left||ROUND).toFixed(1));this.timeT.setColor(this.left<8?'#ff5f9f':'#ffc857');this.comboT.setText(`콤보 ${this.combo||0} · 체력 ${'◆'.repeat(Math.max(0,this.hp||3))}${'◇'.repeat(Math.max(0,3-(this.hp||3)))}`);this.midT.setText((this.fever?`피버 ${(this.fever/1000).toFixed(1)}s`:'별조각 '+(this.shards||0))) }fx(x,y,c,n){for(let i=0;i<n;i++){let d=this.add.circle(x,y,Phaser.Math.FloatBetween(2,4.8),c,Phaser.Math.FloatBetween(.62,.95)).setDepth(16);this.tweens.add({targets:d,x:x+Phaser.Math.Between(-52,52),y:y+Phaser.Math.Between(-52,36),alpha:0,scale:.2,duration:Phaser.Math.Between(310,560),onComplete:()=>d.destroy()})}}pop(x,y,s){let t=this.add.text(x,y,s,{fontFamily:'Pretendard,sans-serif',fontSize:'16px',fontStyle:'900',color:'#f8fbff',shadow:{color:'#001622',blur:8,fill:true}}).setOrigin(.5).setDepth(18);this.tweens.add({targets:t,y:y-34,alpha:0,duration:620,onComplete:()=>t.destroy()})}clear(){this.actors.forEach(a=>a.img.destroy());this.actors=[]}}new Phaser.Game({type:Phaser.AUTO,parent:'game',width:W,height:H,backgroundColor:'#07131f',scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},render:{antialias:true,pixelArt:false},scene:[S]})})();
</script>
